name: 提交考核仓库
message: 用这个模板提交你的考核仓库，供评分 agent 自动评分。
title: "[submission] <你的 GitHub 用户名> - <题目仓库名>"
labels:
  - submission
body:
  - type: input
    id: github_username
    attributes:
      label: GitHub 用户名
      description: 请填写你自己的 GitHub 用户名
      placeholder: your-github-username
    validations:
      required: true

  - type: dropdown
    id: task_repo
    attributes:
      label: 题目仓库名
      description: 请选择你提交的是哪一道题
      options:
        - dev-2026-01
        - dev-2026-02
        - dev-2026-03
        - dev-2026-04
        - dev-2026-05
    validations:
      required: true

  - type: input
    id: submission_repo
    attributes:
      label: 你的提交仓库地址
      description: 请填写你自己的 GitHub 仓库完整地址
      placeholder: https://github.com/your-name/dev-2026-01
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 如果有没做完的部分，可以提前说明
      placeholder: 例如：README 还没完善 / 第三个功能还没完成
